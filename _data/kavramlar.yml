# Vird'ûl-Mefhum — Kavram Virdi
# Her kavram: Arapça yazılışı, münzevinin yüklediği anlam, ve zamanla değişen katmanlar

- id: sekine
  word: sekîne
  arabic: سكينه
  essence: "haz ve hız çağında durabilmek"
  layers:
    - date: "Mart 2023"
      text: "inişli çıkışlı çizgiler sonrası yolunu bulma, karara varma ve son çizgisinde tutarlı olma halidir sekîne. bir 'lâ' demektir aslında — asıl önceliği dışındaki her şeye 'hayır' diyebilmek."
    - date: "Bugün"
      text: "durağanlık dikey düzlemde değil yatay düzlemde olmalı. yatay hareket sizi yüzeyde dolandırırken dikey hareket en-derine ulaştırır. pergel gibi — bir ayak sabit, diğer ayak döner."
